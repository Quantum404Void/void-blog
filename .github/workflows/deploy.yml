name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          PUBLIC_COMPILER_WORKER_URL: https://wandbox-proxy.moke521-wang.workers.dev

      - name: Write deploy wrangler config
        run: |
          cat > wrangler.deploy.json << 'EOF'
          {
            "name": "void-blog",
            "compatibility_date": "2025-01-01",
            "compatibility_flags": ["nodejs_compat"],
            "main": "dist/server/entry.mjs",
            "assets": {
              "directory": "./dist/client"
            },
            "d1_databases": [
              {
                "binding": "void_blog_posts",
                "database_name": "void-blog-posts",
                "database_id": "c97bc822-cd27-46eb-8cdb-1f0b49447f04"
              }
            ]
          }
          EOF

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --config wrangler.deploy.json
