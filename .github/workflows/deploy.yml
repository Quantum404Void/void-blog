name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          PUBLIC_COMPILER_WORKER_URL: https://wandbox-proxy.moke521-wang.workers.dev

      - name: Prepare dist for CF Pages SSR
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            // 1. Fix server/wrangler.json — keep only Pages-compatible fields
            const cfgPath = 'dist/server/wrangler.json';
            const cfg = JSON.parse(fs.readFileSync(cfgPath, 'utf8'));
            const clean = {
              name: cfg.name,
              compatibility_date: cfg.compatibility_date,
              compatibility_flags: cfg.compatibility_flags,
              main: cfg.main,
              d1_databases: cfg.d1_databases,
              vars: cfg.vars || {},
            };
            fs.writeFileSync(cfgPath, JSON.stringify(clean, null, 2));
            console.log('Cleaned wrangler.json:', JSON.stringify(clean, null, 2));

            // 2. Copy static assets from dist/client into dist/server
            //    so that wrangler pages deploy dist/server has all files
            const clientDir = 'dist/client';
            const serverDir = 'dist/server';
            function copyDir(src, dest) {
              if (!fs.existsSync(dest)) fs.mkdirSync(dest, { recursive: true });
              for (const item of fs.readdirSync(src)) {
                const s = path.join(src, item), d = path.join(dest, item);
                if (fs.statSync(s).isDirectory()) copyDir(s, d);
                else fs.copyFileSync(s, d);
              }
            }
            copyDir(clientDir, serverDir);
            console.log('Copied client assets into server dir');
          "

      - name: Bind D1 to Pages project
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/pages/projects/void-blog" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"deployment_configs":{"production":{"d1_databases":{"void_blog_posts":{"id":"c97bc822-cd27-46eb-8cdb-1f0b49447f04"}}},"preview":{"d1_databases":{"void_blog_posts":{"id":"c97bc822-cd27-46eb-8cdb-1f0b49447f04"}}}}}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('D1 bind:', 'ok' if d['success'] else d['errors'])"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist/server --project-name=void-blog
