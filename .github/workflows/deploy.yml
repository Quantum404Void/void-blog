name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          PUBLIC_COMPILER_WORKER_URL: https://wandbox-proxy.moke521-wang.workers.dev

      - name: Fix wrangler.json (remove Pages-incompatible fields)
        run: |
          node -e "
            const fs = require('fs');
            const p = 'dist/server/wrangler.json';
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            // CF Pages 不支持这些字段
            delete cfg.assets;
            delete cfg.images;
            delete cfg.kv_namespaces;
            delete cfg.main;
            delete cfg.rules;
            delete cfg.pages_build_output_dir;
            delete cfg.triggers;
            delete cfg.no_bundle;
            delete cfg.previews;
            delete cfg.dev;
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2));
            console.log('Fixed wrangler.json');
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=void-blog
